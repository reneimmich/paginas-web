<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora | Rene Immich</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      font-family: 'Segoe UI', sans-serif;
      color: #e6edf3;
    }

    h1 {
      font-size: 1rem;
      color: #8b949e;
      margin-bottom: 1.5rem;
      letter-spacing: 0.5px;
    }

    .calculator {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 1.5rem;
      width: 320px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    /* DISPLAY */
    .display {
      background: #0d1117;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.2rem;
      text-align: right;
      border: 1px solid #21262d;
    }

    .display-expression {
      font-size: 0.85rem;
      color: #8b949e;
      min-height: 1.2rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .display-result {
      font-size: 2.2rem;
      font-weight: 300;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: -1px;
      min-height: 2.8rem;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    /* BUTTONS */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.6rem;
    }

    button {
      padding: 1rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
      color: #e6edf3;
    }

    button:active {
      transform: scale(0.92);
    }

    /* Button types */
    .btn-num {
      background: #21262d;
    }
    .btn-num:hover { background: #2d333b; }

    .btn-op {
      background: #1c2128;
      color: #58a6ff;
      font-size: 1.15rem;
    }
    .btn-op:hover { background: #2d333b; }

    .btn-clear {
      background: #3d1f1f;
      color: #f78166;
    }
    .btn-clear:hover { background: #5a2121; }

    .btn-equal {
      background: #1f4a1f;
      color: #3fb950;
      font-size: 1.3rem;
    }
    .btn-equal:hover { background: #2a6b2a; }

    .btn-special {
      background: #1c2128;
      color: #e6edf3;
      font-size: 0.9rem;
    }
    .btn-special:hover { background: #2d333b; }

    .span-two { grid-column: span 2; }

    /* HISTORY */
    .history {
      margin-top: 1.2rem;
      background: #0d1117;
      border-radius: 12px;
      padding: 0.8rem 1rem;
      border: 1px solid #21262d;
      max-height: 120px;
      overflow-y: auto;
    }

    .history h2 {
      font-size: 0.75rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .history-list {
      list-style: none;
    }

    .history-list li {
      font-size: 0.82rem;
      color: #8b949e;
      padding: 0.2rem 0;
      border-bottom: 1px solid #21262d;
    }

    .history-list li:last-child { border-bottom: none; }

    .history-list .h-result { color: #e6edf3; font-weight: 600; }

    .back-link {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #58a6ff;
      text-decoration: none;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <h1>🧮 Calculadora</h1>

  <div class="calculator">
    <div class="display">
      <div class="display-expression" id="expression">&nbsp;</div>
      <div class="display-result" id="result">0</div>
    </div>

    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-special" onclick="toggleSign()">+/-</button>
      <button class="btn-special" onclick="percentage()">%</button>
      <button class="btn-op" onclick="inputOp('/')">÷</button>

      <!-- Row 2 -->
      <button class="btn-num" onclick="inputNum('7')">7</button>
      <button class="btn-num" onclick="inputNum('8')">8</button>
      <button class="btn-num" onclick="inputNum('9')">9</button>
      <button class="btn-op" onclick="inputOp('*')">×</button>

      <!-- Row 3 -->
      <button class="btn-num" onclick="inputNum('4')">4</button>
      <button class="btn-num" onclick="inputNum('5')">5</button>
      <button class="btn-num" onclick="inputNum('6')">6</button>
      <button class="btn-op" onclick="inputOp('-')">−</button>

      <!-- Row 4 -->
      <button class="btn-num" onclick="inputNum('1')">1</button>
      <button class="btn-num" onclick="inputNum('2')">2</button>
      <button class="btn-num" onclick="inputNum('3')">3</button>
      <button class="btn-op" onclick="inputOp('+')">+</button>

      <!-- Row 5 -->
      <button class="btn-num span-two" onclick="inputNum('0')">0</button>
      <button class="btn-num" onclick="inputDot()">.</button>
      <button class="btn-equal" onclick="calculate()">=</button>
    </div>

    <!-- Histórico -->
    <div class="history">
      <h2>Histórico</h2>
      <ul class="history-list" id="history-list">
        <li style="color:#30363d">Sem cálculos ainda...</li>
      </ul>
    </div>
  </div>

  <a class="back-link" href="index.html">← Voltar ao portfólio</a>

  <script>
    // Estado da calculadora
    let currentValue = '0';
    let previousValue = '';
    let operator = null;
    let shouldResetDisplay = false;
    let fullExpression = '';
    const history = [];

    const resultEl = document.getElementById('result');
    const expressionEl = document.getElementById('expression');
    const historyList = document.getElementById('history-list');

    function updateDisplay(value) {
      // Limita o tamanho para não transbordar
      const str = String(value);
      resultEl.textContent = str.length > 12 ? parseFloat(value).toExponential(4) : str;
    }

    function inputNum(num) {
      if (shouldResetDisplay) {
        currentValue = num;
        shouldResetDisplay = false;
      } else {
        currentValue = currentValue === '0' ? num : currentValue + num;
      }
      updateDisplay(currentValue);
    }

    function inputDot() {
      if (shouldResetDisplay) {
        currentValue = '0.';
        shouldResetDisplay = false;
      } else if (!currentValue.includes('.')) {
        currentValue += '.';
      }
      updateDisplay(currentValue);
    }

    function inputOp(op) {
      if (operator && !shouldResetDisplay) {
        calculate(true);
      }
      previousValue = currentValue;
      operator = op;
      shouldResetDisplay = true;

      const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
      expressionEl.textContent = previousValue + ' ' + symbols[op];
    }

    function calculate(chained = false) {
      if (!operator || previousValue === '') return;

      const prev = parseFloat(previousValue);
      const curr = parseFloat(currentValue);
      let result;

      switch (operator) {
        case '+': result = prev + curr; break;
        case '-': result = prev - curr; break;
        case '*': result = prev * curr; break;
        case '/':
          if (curr === 0) {
            updateDisplay('Erro');
            expressionEl.textContent = 'Divisão por zero!';
            operator = null;
            return;
          }
          result = prev / curr;
          break;
        default: return;
      }

      // Evita ponto flutuante bizarro
      result = parseFloat(result.toPrecision(10));

      if (!chained) {
        const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
        const entry = previousValue + ' ' + symbols[operator] + ' ' + currentValue + ' = ' + result;
        addToHistory(entry, result);
        expressionEl.textContent = entry;
      }

      currentValue = String(result);
      updateDisplay(currentValue);
      operator = null;
      shouldResetDisplay = true;
    }

    function clearAll() {
      currentValue = '0';
      previousValue = '';
      operator = null;
      shouldResetDisplay = false;
      fullExpression = '';
      updateDisplay('0');
      expressionEl.textContent = '';
    }

    function toggleSign() {
      currentValue = String(parseFloat(currentValue) * -1);
      updateDisplay(currentValue);
    }

    function percentage() {
      currentValue = String(parseFloat(currentValue) / 100);
      updateDisplay(currentValue);
    }

    function addToHistory(expression, result) {
      history.unshift({ expression, result });
      if (history.length > 10) history.pop();
      renderHistory();
    }

    function renderHistory() {
      if (history.length === 0) {
        historyList.innerHTML = '<li style="color:#30363d">Sem cálculos ainda...</li>';
        return;
      }
      historyList.innerHTML = history.map(h =>
        '<li>' + h.expression.replace(/=.*/, '') + '= <span class="h-result">' + h.result + '</span></li>'
      ).join('');
    }

    // Suporte ao teclado
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') inputNum(e.key);
      else if (e.key === '.') inputDot();
      else if (e.key === '+') inputOp('+');
      else if (e.key === '-') inputOp('-');
      else if (e.key === '*') inputOp('*');
      else if (e.key === '/') { e.preventDefault(); inputOp('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (currentValue.length > 1) {
          currentValue = currentValue.slice(0, -1);
        } else {
          currentValue = '0';
        }
        updateDisplay(currentValue);
      }
    });
  </script>

</body>
        </html>
